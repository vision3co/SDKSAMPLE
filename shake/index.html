<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail</title>
    <style>
        .f-center {
            display: -webkit-box;
            display: -moz-box;
            display: -ms-flexbox;
            display: -webkit-flex;
            display: flex;
            -webkit-align-content: center;
            -ms-flex-line-pack: center;
            align-content: center;
            -webkit-box-pack: center;
            -moz-box-pack: center;
            -webkit-justify-content: center;
            -ms-flex-pack: center;
            justify-content: center;
            -webkit-box-align: center;
            -moz-box-align: center;
            -webkit-align-items: center;
            -ms-flex-align: center;
            align-items: center;
        }

        .f-center-st {
            display: -webkit-box;
            display: -moz-box;
            display: -ms-flexbox;
            display: -webkit-flex;
            display: flex;
            -webkit-align-content: stretch;
            -ms-flex-line-pack: stretch;
            align-content: stretch;
            -webkit-box-pack: stretch;
            -moz-box-pack: stretch;
            -webkit-justify-content: stretch;
            -ms-flex-pack: stretch;
            justify-content: stretch;
            -webkit-box-align: stretch;
            -moz-box-align: stretch;
            -webkit-align-items: stretch;
            -ms-flex-align: stretch;
            align-items: stretch;
        }

        div {
            overflow-x: hidden;
        }


        .w-full {

            width: 100%;

        }

        .popup {
            border: solid 1px #555555;
            border-radius: 5px;
            padding: 10px;
            background-color: #eeeeee;
        }

        .thumbnail {
            margin: 10px;
            border-radius: 5px !important;
            overflow: hidden;
            background-color: #eeeeee;
        }

        .gray {
            background-color: #b4b4b4;
        }

        .black {
            background-color: #000000;
        }

        .light {
            background-color: #efefef;
        }

        .white {
            background-color: #ffffff;
        }

        .w-middle {
            width: 100%;
            max-width: 1360px;
        }

        .w-panel {
            width: 40%;
            max-width: 400px;
        }

        .h-full {
            height: 100% !important;
        }

        .t-00 {
            top: 100% !important;
        }

        .l-00 {
            left: 100% !important;
        }

        .fixed {
            position: fixed;
        }

        .relative {
            position: relative;
        }

        .absolute {
            position: absolute;
        }





        body,
        html {
            padding: 0px;
            margin: 0px;
            min-height: 100%;

        }

        *,
        div {

            font-family: "Roboto", sans-serif;
            font-optical-sizing: auto;
            font-weight: 500;
            font-style: normal;
            font-variation-settings:
                "wdth" 100;

        }

        pre {
            margin: 3px;
        }

        pre,
        code {
            font-size: 9pt !important;
            border-radius: 5px;

        }
    </style>

    <script>
        async function tryAction(th) {
            window.eval('   async function local(){ ' + th.parentNode.querySelector('code').innerText + ' }; local();');
        }
    </script>

    <link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <script src="/planner/z_planner.js"></script>
    <script src="https://dev.admin.visionthree.io/scripts/v3/bundle.min.js" type="text/javascript"> </script>

</head>

<body>

    <div class="w-full   f-center  h-full">
        <script>
            var initElement = function () {



                // after 3D load you can get Materials list or Model setting
                document.getElementById('v3id').addEventListener(v3.EVENT.READY_MODEL, async (e) => {


                    v3.gl_set = { x: 0, y: 0, z: 0, z: 0 };
 

                    v3.main.live_frame = function () {

                        if (v3.main.templates['model4#def'] && v3.main.templates['model4#def'].mesh) {


                            v3.gl_set.y = v3.main.camera.alpha;

                            if( v3.gl_set.y >  v3.gl_set.x) {
                                 if( v3.gl_set.x <  v3.gl_set.y-2.2 ) v3.gl_set.x  = v3.gl_set.y-2.2;
                                 
                                 v3.gl_set.x += abs((v3.gl_set.x - v3.gl_set.y))/10.+0.01;
                            }
                            if( v3.gl_set.y <  v3.gl_set.x) { 
                                 if( v3.gl_set.x >  v3.gl_set.y+2.2 ) v3.gl_set.x  = v3.gl_set.y+2.2;
                                 v3.gl_set.x -= abs((v3.gl_set.x - v3.gl_set.y))/10.+0.01;
                            }
                            

                           // v3.gl_set.x =  (v3.gl_set.x + v3.gl_set.y) / 2.0;

                         
                            v3.tim2 = max(-2.2,min(2.2,(v3.gl_set.x - v3.gl_set.y)));
                            v3.tim1  = sin(  v3.tim2);

                            document.getElementById('stat').innerHTML = floor((v3.gl_set.x - v3.gl_set.y) * 1000) / 1000;

                            //   v3.main.templates['model4#def'].mesh._children[1]._children[0]._children[6].material.setVector4('_color1',{x:1,y:0,z:0,w:1});
                        }

                        for (var i in v3.main._parts) {
                            v3.main.updateShaderSet(v3.main, i);
                        }

                    };



                });
            };

            setTimeout(() => {

                initElement();

            }, 2000);
        </script>
        <div class="w-middle f-center-st  h-full ">
            <div class="w-middle">
                <h2 id="stat">Product Mouse Effect</h2>
                <div class="w-full">
                    <v3-viewer id="v3id" setting="{
                model:'model4', 
                background:'#fcfcfc',  
                 materials:{ 
                    'item 2' :{code:'anim_mat' } ,
                   
                     
                 },
                pan:1000,
                camera:{angle_x:65.57,angle_y:84 ,distance:1.5 }}" onready="initElement()" shadow="true" subdomain="bb"
                        name="main" style="width: 100%; height: 800px;">
                    </v3-viewer>
                </div>
                <div>

                </div>
            </div>
        </div>
    </div>
</body>

</html>
