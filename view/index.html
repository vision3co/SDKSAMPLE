<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail</title>
    <style>
        .f-center {
            display: -webkit-box;
            display: -moz-box;
            display: -ms-flexbox;
            display: -webkit-flex;
            display: flex;
            -webkit-align-content: center;
            -ms-flex-line-pack: center;
            align-content: center;
            -webkit-box-pack: center;
            -moz-box-pack: center;
            -webkit-justify-content: center;
            -ms-flex-pack: center;
            justify-content: center;
            -webkit-box-align: center;
            -moz-box-align: center;
            -webkit-align-items: center;
            -ms-flex-align: center;
            align-items: center;
        }

        .f-center-st {
            display: -webkit-box;
            display: -moz-box;
            display: -ms-flexbox;
            display: -webkit-flex;
            display: flex;
            -webkit-align-content: stretch;
            -ms-flex-line-pack: stretch;
            align-content: stretch;
            -webkit-box-pack: stretch;
            -moz-box-pack: stretch;
            -webkit-justify-content: stretch;
            -ms-flex-pack: stretch;
            justify-content: stretch;
            -webkit-box-align: stretch;
            -moz-box-align: stretch;
            -webkit-align-items: stretch;
            -ms-flex-align: stretch;
            align-items: stretch;
        }

        div {
            overflow-x: hidden;
        }


        .w-full {

            width: 100%;

        }

        .popup {
            border: solid 1px #555555;
            border-radius: 5px;
            padding: 10px;
            background-color: #eeeeee;
        }

        .thumbnail {
            margin: 10px;
            border-radius: 5px !important;
            overflow: hidden;
            background-color: #eeeeee;
        }

        .gray {
            background-color: #b4b4b4;
        }

        .black {
            background-color: #000000;
        }

        .light {
            background-color: #efefef;
        }

        .white {
            background-color: #ffffff;
        }

        .w-middle {
            width: 100%;
            max-width: 1360px;
        }

        .w-panel {
            width: 60%;
            max-width: 500px;
        }

        .h-full {
            height: 100% !important;
        }

        .t-00 {
            top: 100% !important;
        }

        .l-00 {
            left: 100% !important;
        }

        .fixed {
            position: fixed;
        }

        .relative {
            position: relative;
        }

        .absolute {
            position: absolute;
        }





        body,
        html {
            padding: 0px;
            margin: 0px;
            min-height: 100%;

        }

        *,
        div {

            font-family: "Roboto", sans-serif;
            font-optical-sizing: auto;
            font-weight: 500;
            font-style: normal;
            font-variation-settings:
                "wdth" 100;

        }

        pre {
            margin: 3px;
        }

        pre,
        code {
            font-size: 9pt !important;
            border-radius: 5px;

        }
    </style>

    <script>
        async function tryAction(th) {
            window.eval('   async function local(){ ' + th.parentNode.querySelector('code').innerText + ' }; local();');
        }
    </script>

    <link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">


    <script src="https://dev.admin.visionthree.io/scripts/v3/bundle.min.js" type="text/javascript"> </script>
</head>

<body>

    <div class="w-full   f-center  h-full">

        <div class="w-middle f-center-st  h-full ">
            <div class="w-middle">
                <script>
                    var initElement = function () {



                        // after 3D load you can get Materials list or Model setting
                        document.getElementById('v3id').addEventListener(v3.EVENT.READY_MODEL, async (e) => {

                            v3.main.onChangeEventStart = true;

                            v3.main.onChange('camera.alpha', function (m, v) { console.log(v); document.getElementById('camera_alpha').value = v * rad; });
                            v3.main.onChange('camera.beta', function (m, v) { console.log(v); document.getElementById('camera_beta').value = v * rad; });
                            v3.main.onChange('camera.radius', function (m, v) { console.log(v); document.getElementById('camera_radius').value = v; });
                            v3.main.onChange('camera.fov', function (m, v) { console.log(v); document.getElementById('camera_fov').value = v; });
                            v3.main.onChange('camera.target.x', function (m, v) { console.log(v); document.getElementById('camera_tarx').value = v; });
                            v3.main.onChange('camera.target.y', function (m, v) { console.log(v); document.getElementById('camera_tary').value = v; });
                            v3.main.onChange('camera.target.z', function (m, v) { console.log(v); document.getElementById('camera_tarz').value = v; });

                           /* v3.main.groupMaterials({}, function (list) {
                               
                            }); */

                           /* v3.main.loadTemplate({}); */ 

                        });
                    }
                </script>
                <h2>Product Detail Page</h2>
                <div class="w-full">
                    <v3-viewer id="v3id" setting="{
                model:'Didsbury Bed 2 Drawer', 
                background:'#ecf1fc',  
                materials:{ 
                      UPHOLSTERY :{code:'SILVER GREY' } ,
                    BEDDING:{ code :'BASEBEDDING'} ,
                    LEGS:{ code : 'CHROME'}  ,
                    HEADBOARDBACK : { code:'BASE'} ,
                    PLASTICPARTS : { code:'BASE'}  
                   
                 },
                pan:1000,
                disable3dLoader:true,
                camera:{angle_x:65.57,angle_y:84 ,distance:1.5 }}" shadow="true" subdomain="simba" name="main"
                        onready="initElement()" style="width: 100%; height: 800px;">
                    </v3-viewer>
                </div>
                <div>

                </div>
            </div>
            <div class="relative   w-panel h-full "
                style="margin-top: 50px;margin-left: 20px; max-height: 800px; overflow-y:scroll;overflow-x:hidden; border: solid 1px #000000;border-radius: 5px;padding: 10px;">
                <h3>Camera : </h3>

                <div class=" w-panel ">
                    <div class="fs-2">Alpha :</div>
                    <input class=" w-full" type="number" id="camera_alpha"
                        onkeyup="if(event.keyCode=='13') v3.main.camera.alpha = this.value*deg; " />
                </div>

                <div>
                    <div class="fs-2">Beta :</div>
                    <input class=" w-panel" type="number" id="camera_beta"
                        onkeyup="if(event.keyCode=='13') v3.main.camera.beta = this.value*deg; " />
                </div>

                <div>
                    <div class="fs-2">Radius :</div>
                    <input class=" w-panel" type="number" id="camera_radius"
                        onkeyup="if(event.keyCode=='13') v3.main.camera.radius = this.value ; " />
                </div>

                <div>
                    <div class="fs-2">Perspective :</div>
                    <input class=" w-panel" type="range" min="0.2" max="1.8" step="0.01" id="camera_fov"
                        oninput=" v3.main.camera.fov = this.value ; " />
                </div>

                <h2>Target</h2>
                <div>
                    <div class="fs-2"> Target X :</div>
                    <input class=" w-panel" type="number" id="camera_tarx"
                        onkeyup="if(event.keyCode=='13') v3.main.camera.target.x = this.value ; " />
                </div>
                <div>
                    <div class="fs-2"> Target Y :</div>
                    <input class=" w-panel" type="number" id="camera_tary"
                        onkeyup="if(event.keyCode=='13') v3.main.camera.target.y = this.value ; " />
                </div>
                <div>
                    <div class="fs-2"> Target Z :</div>
                    <input class=" w-panel" type="number" id="camera_tarz"
                        onkeyup="if(event.keyCode=='13') v3.main.camera.target.z = this.value ; " />
                </div>

            </div>

        </div>
    </div>
</body>

</html>
