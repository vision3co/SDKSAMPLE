<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail</title>
    <script src="https://dev.admin.visionthree.io/scripts/v3/bundle.min.js" type="text/javascript"> </script>
    <style>
        .f-center {
            display: -webkit-box;
            display: -moz-box;
            display: -ms-flexbox;
            display: -webkit-flex;
            display: flex;
            -webkit-align-content: center;
            -ms-flex-line-pack: center;
            align-content: center;
            -webkit-box-pack: center;
            -moz-box-pack: center;
            -webkit-justify-content: center;
            -ms-flex-pack: center;
            justify-content: center;
            -webkit-box-align: center;
            -moz-box-align: center;
            -webkit-align-items: center;
            -ms-flex-align: center;
            align-items: center;
        }

        .f-center-st {
            display: -webkit-box;
            display: -moz-box;
            display: -ms-flexbox;
            display: -webkit-flex;
            display: flex;
            -webkit-align-content: stretch;
            -ms-flex-line-pack: stretch;
            align-content: stretch;
            -webkit-box-pack: stretch;
            -moz-box-pack: stretch;
            -webkit-justify-content: stretch;
            -ms-flex-pack: stretch;
            justify-content: stretch;
            -webkit-box-align: stretch;
            -moz-box-align: stretch;
            -webkit-align-items: stretch;
            -ms-flex-align: stretch;
            align-items: stretch;
        }


        .w-full {

            width: 100%;

        }

        .popup {
            margin: 50px;
            border: solid 1px #555555;
            border-radius: 5px;
            padding: 50px;
            background-color: #eeeeee;
        }

        .thumbnail {
            border-radius: 5px !important;
            overflow: hidden;
            margin: 10px;
            background-color: #eeeeee;
        }



        .gray {
            background-color: #b4b4b4;
        }

        .black {
            background-color: #000000;
        }

        .light {
            background-color: #efefef;
        }

        .white {
            background-color: #ffffff;
        }

        .w-middle {
            width: 100%;
            max-width: 1360px;
        }

        .w-panel {
            width: 30%;
            max-width: 300px;
        }

        .w-popuppanel {
            width: 60%;
            max-width: 700px;
        }


        .h-full {
            height: 100% !important;
        }

        .relative {
            position: relative;
        }

        .absolute {
            position: absolute;
        }

        .t-00 {
            top: 0px !important;
        }

        .l-00 {
            left: 0px !important;
        }

        .fixed {
            position: fixed;
            z-index: 999999;
            background-color: #00000055;
        }

        body,
        html {
            padding: 0px;
            margin: 0px;
            min-height: 100%;
        }

        input {
            margin: 5px;
            padding: 5px;
            border-radius: 3px;
            border: none;
            color: #393939;

        }

        input:hover {
            cursor: pointer;
            color: #08005f;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <h2>Product Detail Page</h2>
    <div class="w-full gray f-center  h-full">

        <div class="w-middle f-center-st  h-full ">
            <script>
                var global_model_status = {
                    model: 'Didsbury Bed',
                    type: 'No Storage',
                    color: 'SILVER GREY',
                    leg: 'CHROME',

                };



                var initElement = function () {

                  

                    // after 3D load you can get Materials list or Model setting
                    document.getElementById('v3id').addEventListener(v3.EVENT.READY_MODEL, async (e) => {

                        

                        function add_color_button(name, code) {
                            var el = document.createElement('input');

                            el.type = 'button';
                            el.value = name;

                            el.onclick = function () {
                                v3.main.changeMaterial('UPHOLSTERY', code);
                                global_model_status.color = code;
                            }

                            document.getElementById('color_options').appendChild(el);
                        }

                        var stepOneMaterials = v3.main.getGroupMaterials('StepOne');

                        console.log(stepOneMaterials);

                        for (var i in stepOneMaterials)
                            add_color_button(stepOneMaterials[i].name, stepOneMaterials[i].code);


                        // get Setting for Model

                        console.log(v3.main.getModelOptions());


                    });


                }


            </script>
            <div class="w-middle  light   ">
                <div class="w-full">
                    <v3-viewer id="v3id" setting="{
                model:'Didsbury Bed No Storage', 
                background:'#fcfcfc',  
                 materials:{ 
                    UPHOLSTERY :{code:'SILVER GREY' } ,
                    BEDDING:{ code :'BASEBEDDING'} ,
                    LEGS:{ code : 'WOODEN'}  ,
                    HEADBOARDBACK : { code:'BASE'} ,
                    PLASTICPARTS : { code:'BASE'} },
                pan:1000,
                camera:{angle_x:65.57,angle_y:84,distance:2.5 }}" shadow="true" subdomain="simba" name="main"
                        onready="initElement()" style="width: 100%; height: 600px;">
                </div>
                <div class="w-full ">
                    <script>
                        var par = document.currentScript.parentNode;

                        /// data { model:'',type:''}
                        function add_image(size, data) {
                            var el = document.createElement('img');
                            el.className = 'thumbnail';
                            el.src = "https://vphoto.img.haze.tools/simba_" + data.model +
                                " " + data.type +
                                "?zoom=" + data.zoom + "&output_size=" + size +
                                "&size=1024x1024&background=fcfcfc&pan=0.x0.0x0.0" +
                                "&angle_x=" + data.rotate_x + "&angle_y=" + data.rotate_y + "&distance=2.5" +
                                "&materials=UPHOLSTERY:" + data.color + ",BEDDING:BASEBEDDING,LEGS:" + data.leg;

                            par.appendChild(el);
                        }



                        global_model_status.thumbnail_parent = par;

                        global_model_status.update_model = function () {

                            var model = {
                                model: 'Didsbury Bed ' + global_model_status.type,
                                materials: {
                                    UPHOLSTERY: { code: global_model_status.color },
                                    BEDDING: { code: 'BASEBEDDING' },
                                    LEGS: { code: 'CHROME' },
                                    HEADBOARDBACK: { code: 'BASE' },
                                    PLASTICPARTS: { code: 'BASE' }
                                }
                            };

                            v3.main.setModel(model);
                            global_model_status.update_thumbnail();

                        }


                        global_model_status.update_thumbnail = function () {

                            global_model_status.thumbnail_parent.innerHTML = '';


                            add_image('300x250', { model: 'Didsbury Bed', type: global_model_status.type, color: global_model_status.color, leg: global_model_status.leg, rotate_x: 50, rotate_y: 80, zoom: 1 });
                            add_image('300x250', { model: 'Didsbury Bed', type: global_model_status.type, color: global_model_status.color, leg: global_model_status.leg, rotate_x: 0, rotate_y: 70, zoom: 1 });
                            add_image('300x250', { model: 'Didsbury Bed', type: global_model_status.type, color: global_model_status.color, leg: global_model_status.leg, rotate_x: 90, rotate_y: 80, zoom: 1 });
                        }

                        global_model_status.update_thumbnail();

                    </script>
                </div>
            </div>
            <div class="relative w-panel h-full   ">
                <div style="padding: 20px;">
                    Pick Uphlostrey Color:
                    <input class="f-center"
                        onclick=" global_model_status.currentColor  = global_model_status.color; document.getElementById('colorpopup').style.display = '';  v3.main.switchToViewer('VIEW1')"
                        value="Colors" />
                </div>

                <div style="padding: 20px;">
                    Pick Bed Feautre:
                    <input class="f-center"
                        onclick="     global_model_status.type = this.value; global_model_status.update_model(); "
                        value="No Storage" />
                    <input class="f-center"
                        onclick="  global_model_status.type = this.value; global_model_status.update_model(); "
                        value="2 Drawer" />
                    <input class="f-center"
                        onclick="  global_model_status.type = this.value; global_model_status.update_model();  "
                        value="4 Drawer" />
                    <input class="f-center"
                        onclick="   global_model_status.type = this.value; global_model_status.update_model(); "
                        value="Ottoman" />
                </div>

                <div style="padding: 20px;">
                    Pick Legs:
                    <input class="f-center"
                        onclick="     global_model_status.leg = this.value;v3.main.groupVisibility('METALLEGS','WOODLEGS');  v3.main.changeMaterial('METALLEGS',this.value); "
                        value="CHROME" />
                    <input class="f-center"
                        onclick="    global_model_status.leg = this.value;v3.main.groupVisibility('WOODLEGS','METALLEGS'); v3.main.changeMaterial('WOODLEGS',this.value);  "
                        value="WOODEN" />

                </div>


            </div>
        </div>
    </div>
    <!-- Material change popup -->
    <div id="colorpopup" style="display: none;" class="fixed h-full w-full l-00 t-00 f-center ">
        <div class="w-middle popup  f-center ">
            <div class="w-popuppanel   light   ">
                <h2 class="w-full">Colors: </h2>
                <div id="color_options">

                </div>

                <hr />
                <input class="f-center" onclick="document.getElementById('colorpopup').style.display = 'none';  
                     
                     global_model_status.update_thumbnail();
                    v3.main.switchToMain();
                   " value="Apply" />

                <input class="f-center" onclick="document.getElementById('colorpopup').style.display = 'none';  
                      v3.main.changeMaterial('UPHOLSTERY',global_model_status.currentColor); 
                    v3.main.switchToMain();
                    " value="Cancel" />
            </div>
            <div class="w-panel h-full light   ">
                <v3-image name="VIEW1" viewer="main" style="width: 400px;height: 300px;">
                </v3-image>
            </div>
        </div>
    </div>
</body>

</html>
